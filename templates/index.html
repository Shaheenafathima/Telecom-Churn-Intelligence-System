<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telecom Churn Prediction Tool</title>

    <style>
        :root {
            --primary: #1e3a8a;
            --secondary: #2563eb;
            --bg: #f8fafc;
            --text: #1e293b;
        }

        *{
            box-sizing:border-box;
            margin:0;
            padding:0;
            font-family:'Segoe UI',Tahoma,Arial,sans-serif;
        }

        body{
            background:linear-gradient(
                135deg,
                #e0f2fe,
                #dbeafe,
                #ede9fe
            );
            color:var(--text);
            min-height:100vh;
        }

        .navbar{
            background:var(--primary);
            padding:1rem 2rem;
            display:flex;
            justify-content:space-between;
            align-items:center;
        }

        .navbar-brand{
            color:white;
            text-decoration:none;
            font-size:1.3rem;
            font-weight:700;
        }

        .navbar-nav{
            display:flex;
            list-style:none;
            gap:1.5rem;
        }

        .navbar-nav a{
            color:white;
            text-decoration:none;
            font-weight:500;
        }

        .navbar-nav .active{
            color:white;
            border-bottom:2px solid white;
            padding-bottom:4px;
        }

        .container{
            max-width:1100px;
            margin:30px auto;
            padding:30px;
        }
        .section-card{
            background:white;
            border-radius:18px;
            padding:25px;
            margin-bottom:25px;
            box-shadow:0 10px 25px rgba(0,0,0,0.08);
     
        }

        .section-title{
            font-size:22px;
            font-weight:700;
            color:#1e3a8a;
            margin-bottom:20px;
       }

        .form-grid{
            display:grid;
            grid-template-columns:repeat(2,1fr);
            gap:20px;
       }

        h1{
            color:var(--primary);
            margin-bottom:10px;
        }

        .subtitle{
            color:#64748b;
            margin-bottom:25px;
        }

        .form-group{
            margin-bottom:16px;
        }

        label{
            display:block;
            margin-bottom:6px;
            font-weight:600;
        }

        input,
        select{
            width:100%;
            padding:12px;
            border:1px solid #cbd5e1;
            border-radius:6px;
            font-size:15px;
        }

        .btn-submit{
            width:100%;
            padding:14px;
            background:var(--secondary);
            color:white;
            border:none;
            border-radius:6px;
            font-size:16px;
            font-weight:600;
            cursor:pointer;
            margin-top:15px;
        }

        .btn-submit:hover{
            background:#1d4ed8;
        }
    </style>
</head>

<body>

<nav class="navbar">
    <a href="/" class="navbar-brand">📶 Telecom Churn Intelligence</a>

    <ul class="navbar-nav">
        <li><a href="/" class="active">Prediction Engine Tool</a></li>
        <li><a href="/dashboard">Analytics Dashboard</a></li>
        <li><a href="/chatbot">AI Assistant</a></li>
    </ul>
</nav>

<div class="container">

    <h1>📊 Telecom Subscriber Risk Analysis</h1>

    <p class="subtitle">
        Enter customer information to predict churn probability.
    </p>

    <form action="/predict" method="POST">
    <div class="section-card">

        <div class="section-title">
            👤 Customer Profile
        </div>

        <div class="form-grid">

            <div class="form-group">
                <label>Gender</label>
                <select name="gender" required>
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                </select>
            </div>

            <div class="form-group">
                <label>Senior Citizen</label>
                <select name="senior_citizen" required>
                    <option value="0">No</option>
                    <option value="1">Yes</option>
                </select>
            </div>

            <div class="form-group">
                <label>Partner</label>
                <select name="partner" required>
                    <option value="Yes">Yes</option>
                    <option value="No">No</option>
                </select>
            </div>

            <div class="form-group">
                <label>Dependents</label>
                <select name="dependents" required>
                    <option value="Yes">Yes</option>
                    <option value="No">No</option>
                </select>
            </div>

            <div class="form-group">
                <label>Customer Since (Months)</label>
                <input type="number" name="tenure" required>
            </div>

        </div>
    </div>

    <div class="section-card">

        <div class="section-title">
            📞 Telecom Services
        </div>

        <div class="form-grid">    

            <div class="form-group">
                <label>Phone Service</label>
                <select name="phone_service" required>
                    <option value="Yes">Yes</option>
                    <option value="No">No</option>
                </select>
            </div>

            <div class="form-group">
                <label>Multiple Lines</label>
                <select name="multiple_lines" required>
                    <option value="Yes">Yes</option>
                    <option value="No">No</option>
                    <option value="No phone service">No Phone Service</option>
                </select>
            </div>

            <div class="form-group">
                <label>Internet Service</label>
                <select name="internet_service" required>
                    <option value="Fiber optic">5G Ultra-Speed Fiber Broadband</option>
                    <option value="DSL">4G LTE / DSL Connection</option>
                    <option value="No">Voice Only (No Internet)</option>
                </select>
            </div>

            <div class="form-group">
                <label>Online Security</label>
                <select name="online_security" required>
                    <option value="Yes">Yes</option>
                    <option value="No">No</option>
                </select>
            </div>

            <div class="form-group">
                <label>Online Backup</label>
                <select name="online_backup" required>
                    <option value="Yes">Yes</option>
                    <option value="No">No</option>
                </select>
            </div>

            <div class="form-group">
                <label>Device Protection</label>
                <select name="device_protection" required>
                    <option value="Yes">Yes</option>
                    <option value="No">No</option>
                </select>
            </div>

            <div class="form-group">
                <label>Tech Support</label>
                <select name="tech_support" required>
                    <option value="Yes">Yes</option>
                    <option value="No">No</option>
                </select>
            </div>
        </div>
    </div>



    <div class="section-card">

        <div class="section-title">
            🎬 Entertainment Services
        </div>

        <div class="form-grid">
            <div class="form-group">
                <label>Streaming TV</label>
                <select name="streaming_tv" required>
                    <option value="Yes">Yes</option>
                    <option value="No">No</option>
                </select>
        </div>
    


        <div class="form-group">
            <label>Streaming Movies</label>
            <select name="streaming_movies" required>
                <option value="Yes">Yes</option>
                <option value="No">No</option>
            </select>
        </div>
    </div>
    
    
    <div class="section-card">

        <div class="section-title">
            💳 Billing & Contract Details
        </div>

        <div class="form-grid">

            <div class="form-group">
                <label>Contract Type</label>
                <select name="contract" required>
                    <option value="Month-to-month">Prepaid / Month-to-Month Plan</option>

                    <option value="One year">1-Year Postpaid Contract </option>

                    <option value="Two year">2-Year Corporate Agreement</option>
                </select>
            </div>

            <div class="form-group">
                <label>Paperless Billing</label>
                <select name="paperless_billing" required>
                    <option value="Yes">Yes</option>
                    <option value="No">No</option>
                </select>
            </div>

        <div class="form-group">
            <label>Payment Method</label>
            <select name="payment_method" required>
                <option value="Electronic check">Electronic Check (High Risk)</option>
                <option value="Mailed check">Mailed Paper Check</option>
                <option value="Bank transfer (automatic)">Automatic Bank Transfer</option>
                <option value="Credit card (automatic)">Automatic Credit Card</option>
            </select>
        </div>

        <div class="form-group">
            <label>Monthly Charges ($)</label>
            <input type="number" step="0.01" name="monthly_charges" required>
        </div>

        <div class="form-group">
            <label>Total Charges ($)</label>
            <input type="number" step="0.01" name="total_charges" required>
        </div>
    </div>    

        <button type="submit" class="btn-submit">
            ⚡ Predict Churn Risk
        </button>

    </form>

</div>

</body>
</html>
